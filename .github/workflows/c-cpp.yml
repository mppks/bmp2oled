name: C Compilation CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Compile bmp2oled
      run: gcc bmp2oled.c -o bmp2oled -lm

    - name: Compile oled2bmp
      run: gcc oled2bmp.c -o oled2bmp -lm

  publish:
    name: 'Bmp2oled Publish'
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build release binaries
        run: |
          gcc bmp2oled.c -o bmp2oled -lm
          gcc oled2bmp.c -o oled2bmp -lm

      - name: Delete existing release
        continue-on-error: true
        run: gh release delete ${{ github.ref_name }} --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bmp2oled
            oled2bmp
          tag_name: ${{ github.ref_name }}
          name: Latest ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          github_token: ${{ secrets.GITHUB_TOKEN }}